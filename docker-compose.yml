services:
  broker:
    image: eclipse-mosquitto:2
    container_name: trabalho-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  sim:
    build: .
    container_name: trabalho-simulador
    environment:
      PORT: 3000
      SIM_MINUTES_PER_SECOND: 10
      MQTT_URL: mqtt://broker:1883
      PARKING_DB_PATH: data/parking.sqlite
    ports:
      - "3000:3000"
    depends_on:
      - broker
    volumes:
      - ./data:/app/data
    restart: unless-stopped